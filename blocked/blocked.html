<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FocusGuard — Site Blocked</title>
  <link rel="stylesheet" href="blocked.css">
</head>
<body>
  <div class="blocked-page">
    <!-- Animated BG -->
    <div class="blocked-bg">
      <div class="blocked-pulse"></div>
    </div>

    <!-- Shield Icon -->
    <div class="shield-container">
      <div class="shield-ring"></div>
      <svg class="shield-icon" width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
        <line x1="4.93" y1="4.93" x2="19.07" y2="19.07" stroke-width="2"/>
      </svg>
    </div>

    <h1 class="blocked-title">Site Blocked</h1>
    <div class="blocked-domain-pill" id="blockedDomain">website.com</div>
    <p class="blocked-message">
      This site is blocked during your focus session.<br>
      Stay focused — you're making progress!
    </p>

    <!-- Timer -->
    <div class="blocked-timer-card">
      <span class="blocked-timer-label">Time remaining</span>
      <span class="blocked-timer-time" id="blockedTimerTime">25:00</span>
    </div>

    <!-- Actions -->
    <div class="blocked-actions">
      <button class="btn-return" id="btnBack">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <line x1="19" y1="12" x2="5" y2="12"/><polyline points="12,19 5,12 12,5"/>
        </svg>
        Return to Focus
      </button>
      <button class="btn-emergency" id="btnEmergency">
        Emergency Access (5 min)
      </button>
    </div>

    <!-- Quote -->
    <div class="quote">
      <p class="quote-text" id="quoteText"></p>
      <span class="quote-author" id="quoteAuthor"></span>
    </div>
  </div>

  <script src="blocked.js"></script>
</body>
</html>
