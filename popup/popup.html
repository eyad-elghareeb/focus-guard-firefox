<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FocusGuard</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup">
    <!-- Header -->
    <div class="popup-header">
      <div class="popup-logo">
        <svg width="18" height="18" viewBox="0 0 28 28" fill="none">
          <circle cx="14" cy="14" r="12" stroke="currentColor" stroke-width="2.5"/>
          <path d="M14 7v7l4.5 3" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
        </svg>
        <span>FocusGuard</span>
      </div>
      <div class="popup-mode" id="modeBadge">FOCUS</div>
    </div>

    <!-- Timer Ring -->
    <div class="popup-timer-wrap">
      <svg class="popup-ring" viewBox="0 0 120 120">
        <defs>
          <linearGradient id="popupGradWork" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#ef4444"/><stop offset="100%" stop-color="#f97316"/>
          </linearGradient>
          <linearGradient id="popupGradBreak" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#10b981"/><stop offset="100%" stop-color="#06b6d4"/>
          </linearGradient>
        </defs>
        <circle class="popup-ring-bg" cx="60" cy="60" r="52"/>
        <circle class="popup-ring-progress" cx="60" cy="60" r="52"
                id="popupProgress"
                stroke-dasharray="326.73"
                stroke-dashoffset="0"/>
      </svg>
      <div class="popup-time-center">
        <span class="popup-time" id="popupTime">25:00</span>
      </div>
    </div>

    <!-- Controls -->
    <div class="popup-controls">
      <button class="popup-ctrl popup-ctrl-sm" id="popupReset" title="Reset">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
          <path d="M3 3v5h5"/>
        </svg>
      </button>
      <button class="popup-ctrl popup-ctrl-main" id="popupStartPause">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" id="popupPlayIcon">
          <polygon points="6,3 20,12 6,21"/>
        </svg>
      </button>
      <button class="popup-ctrl popup-ctrl-sm" id="popupSkip" title="Skip">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <polygon points="5,4 15,12 5,20" fill="currentColor"/>
          <line x1="19" y1="5" x2="19" y2="19"/>
        </svg>
      </button>
    </div>

    <!-- Quick Stats -->
    <div class="popup-stats">
      <div class="popup-stat">
        <span class="popup-stat-value" id="popupWorkTime">0m</span>
        <span class="popup-stat-label">Today</span>
      </div>
      <div class="popup-stat-divider"></div>
      <div class="popup-stat">
        <span class="popup-stat-value" id="popupStreak">0</span>
        <span class="popup-stat-label">Streak</span>
      </div>
      <div class="popup-stat-divider"></div>
      <div class="popup-stat">
        <span class="popup-stat-value" id="popupPomodoroCount">0</span>
        <span class="popup-stat-label">Done</span>
      </div>
    </div>

    <!-- Dashboard Button -->
    <button class="popup-dashboard" id="popupDashboard">
      Open Dashboard
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <polyline points="9,18 15,12 9,6"/>
      </svg>
    </button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
