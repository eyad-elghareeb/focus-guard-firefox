name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build extension zip
        run: |
          VERSION="${GITHUB_REF_NAME}"
          echo "Building FocusGuard ${VERSION}"
          mkdir -p dist
          zip -r "dist/focusguard-firefox-${VERSION}.zip" \
            manifest.json \
            background/ \
            blocked/ \
            icons/ \
            newtab/ \
            popup/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.zip
          generate_release_notes: true
