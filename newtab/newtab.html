<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>New Tab</title>
  <link rel="stylesheet" href="newtab.css">
</head>
<body>
  <div class="bg-effects">
    <div class="bg-orb bg-orb-1"></div>
    <div class="bg-orb bg-orb-2"></div>
    <div class="bg-orb bg-orb-3"></div>
  </div>

  <main class="nt-main">
    <div class="nt-clock" id="clock">00:00</div>
    <div class="nt-date" id="dateDisplay">Monday, January 1</div>

    <div class="nt-search" id="searchWrap">
      <svg class="nt-search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input type="text" id="searchInput" placeholder="Search the web or type a URL..." autofocus spellcheck="false" autocomplete="off">
      <button class="nt-search-btn" id="searchBtn" title="Search">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/>
        </svg>
      </button>
    </div>

    <div class="nt-divider"></div>

    <div class="nt-stats">
      <div class="nt-stat">
        <span class="nt-stat-value" id="statTime">0m</span>
        <span class="nt-stat-label">Focused Today</span>
      </div>
      <div class="nt-stat-divider"></div>
      <div class="nt-stat">
        <span class="nt-stat-value" id="statPomodoros">0</span>
        <span class="nt-stat-label">Pomodoros</span>
      </div>
      <div class="nt-stat-divider"></div>
      <div class="nt-stat">
        <span class="nt-stat-value" id="statStreak">0</span>
        <span class="nt-stat-label">Day Streak</span>
      </div>
    </div>

    <button class="nt-btn" id="btnStartFocus">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
      </svg>
      Start a Focus Session
    </button>

    <div class="nt-status" id="timerStatus"></div>
  </main>

  <script src="newtab.js"></script>
</body>
</html>
